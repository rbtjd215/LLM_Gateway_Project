name: AutoCore CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        
    - name: Run Core Logic Tests
      env:
        PYTHONPATH: .
      run: |
        # 외부 API나 모델이 필요 없는 정규식 마스킹 및 역치환 단위 테스트만 실행
        pytest tests/test_security.py::TestRegexMasking
        pytest tests/test_security.py::TestCheckIntent
